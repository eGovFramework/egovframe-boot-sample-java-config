apiVersion: apps/v1
kind: Deployment
metadata:
  name: egovframe-boot-sample-java-config
  labels:
    app.kubernetes.io/name: egovframe-boot-sample-java-config
    app.kubernetes.io/part-of: egovframe-sample
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: egovframe-boot-sample-java-config
  template:
    metadata:
      labels:
        app.kubernetes.io/name: egovframe-boot-sample-java-config
        app.kubernetes.io/part-of: egovframe-sample
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: app
          # Replace with your registry/tag, e.g. ghcr.io/<org>/egovframe-boot-sample-java-config:5.0.0
          image: egovframe-boot-sample-java-config:5.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "800m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
